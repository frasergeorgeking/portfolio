version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 5
    rebase-strategy: "auto"

    groups:
      all-npm-non-major-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

    labels:
      - "dependencies"

    assignees:
      - "frasergeorgeking"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"
